<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Contact Form</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: white;
}

.input-box {
  position: relative;
  margin-bottom: 25px;
}

.input-box input,
.input-box textarea {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  outline: none;
  color: white;
  font-size: 15px;
}

.input-box label {
  position: absolute;
  top: 12px;
  left: 12px;
  color: #ccc;
  transition: 0.3s;
  pointer-events: none; /* FIX: Allows clicking through the label to the input */
}

/* Float label logic */
.input-box input:focus ~ label,
.input-box input:valid ~ label,
.input-box textarea:focus ~ label,
.input-box textarea:valid ~ label {
  top: -10px;
  left: 10px;
  font-size: 12px;
  background: #1e3a8a; /* Matches the body background for a 'cutout' look */
  padding: 0 5px;
  color: #38bdf8;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #38bdf8, #6366f1);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.02);
  filter: brightness(1.1);
}

.error {
  color: #f87171;
  font-size: 13px;
  margin-bottom: 15px;
  text-align: center;
  min-height: 18px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>
<body>

<div class="container">
  <!-- Action URL remains your FormSubmit endpoint -->
  <form id="form" action="https://formsubmit.co/dileepyadev712@gmail.com" method="POST">
    
    <h2>Contact Me</h2>
    <div class="error" id="errorMsg"></div>

    <div class="input-box">
      <input type="text" name="name" required>
      <label>Your Name</label>
    </div>

    <div class="input-box">
      <input type="email" id="email" name="email" required>
      <label>Your Email</label>
    </div>

    <div class="input-box">
      <textarea name="message" rows="3" required></textarea>
      <label>Your Message</label>
    </div>

    <!-- Configuration -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Contact Message">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_autoresponse" value="Hi there! Thanks for reaching out. The Sankalp Team will get back to you shortly.">

    <button id="btn" type="submit">Send Message 🚀</button>
  </form>
</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const errorMsg = document.getElementById("errorMsg");
const emailInput = document.getElementById("email");

form.addEventListener("submit", function(e) {
  const email = emailInput.value.trim().toLowerCase();
  
  // Reset error
  errorMsg.innerText = "";

  // Check if it's a Gmail address
  if (!email.endsWith("@gmail.com")) {
    e.preventDefault();
    errorMsg.innerText = "❌ Only @gmail.com addresses are allowed";
    return;
  }

  // Visual feedback only after validation passes
  btn.style.opacity = "0.7";
  btn.innerText = "Sending... ⏳";
  btn.style.pointerEvents = "none";
});
</script>

</body>
</html>
